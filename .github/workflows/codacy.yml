name: Codacy Security Scan

on:
  push:
    branches: ["main"]

  pull_request:
    branches: ["main"]

  schedule:
    - cron: '34 11 * * 3'

permissions:
  contents: read

jobs:
  codacy-security-scan:
    name: Codacy Security Scan
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Optional debug step
      - name: Find non-UTF8 files
        run: |
          find . -type f \
            ! -path "./.git/*" \
            ! -path "./node_modules/*" \
            | while read file; do
                iconv -f UTF-8 -t UTF-8 "$file" > /dev/null 2>&1 \
                  || echo "Non-UTF8 file: $file"
              done

      - name: Run Codacy Analysis
        uses: codacy/codacy-analysis-cli-action@v4

        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}

          verbose: true

          # IMPORTANT:
          # Disable all broken/problematic engines
          tool: eslint

          args: >
            --disable-engine pmd
            --disable-engine pmd-legacy
            --disable-tool duplication
            --disable-tool metrics

          max-allowed-issues: 2147483647

          directory: ${{ github.workspace }}

      # Only upload if SARIF exists
      - name: Upload SARIF results file
        if: hashFiles('results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
